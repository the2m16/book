<!DOCTYPE html>
<html lang="mn"> <head>
    <meta charset="utf-8"/> <meta name="viewport" content="width=device-width, initial-scale=1.0"> <title>2m16</title> <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script> <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script> <link href="https://fonts.googleapis.com/css2?family=Figtree:wght@300;400;600;700&display=swap" rel="stylesheet"> <style>
        :root {
            --blue: #255DDD; --purple: #23265C; --orange: #FF9300; /* Үндсэн өнгөний кодууд */
            --light-blue: #73C5FF; --white: #ffffff; --bg: #f8f9fa; /* Туслах өнгөнүүд */
        }

        body { margin: 0; font-family: 'Figtree', sans-serif; overflow-x: hidden; background: var(--blue); } /* Суурь стиль */

        /* НАВИГАЦИ (NAVBAR) */
        .navbar {
            position: fixed; top: 0; width: 100%; height: 80px; /* Дээд талд түгжих */
            display: flex; justify-content: space-between; align-items: center; /* Элементүүдийг зэрэгцүүлэх */
            padding: 0 5%; background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); /* Шилэн эффект */
            z-index: 2000; box-sizing: border-box; border-bottom: 1px solid #eee; /* Хил болон давхарга */
        }

        .menu-toggle { cursor: pointer; display: flex; align-items: center; gap: 10px; font-weight: 600; z-index: 3000; } /* Цэс товч */
        .hamburger { width: 25px; height: 18px; display: flex; flex-direction: column; justify-content: space-between; } /* Дүрс */
		.hamburger span { display: block; width: 100%; height: 2px; background: var(--purple); transition: 0.3s; } /* Зураасны стиль */

        /* МЕНЮ OVERLAY */
        .nav-overlay {
            position: fixed; top: 0; right: -100%; width: 100%; height: 100vh; /* Нуугдмал төлөв */
            background: var(--purple); display: flex; justify-content: center; align-items: center; /* Төвлөрүүлэх */
            z-index: 2500; transition: right 0.6s cubic-bezier(0.7, 0, 0.3, 1); /* Нээгдэх хурд */
        }
        .nav-overlay.open { right: 0; } /* Нээлттэй төлөв */
        .nav-links a { color: white; font-size: 3rem; text-decoration: none; display: block; margin: 20px; font-weight: 700; } /* Линк стиль */

        /* HERO SECTION */
        .hero { height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; } /* Төв хэсэг */
        .hero h1 { font-size: clamp(2.5rem, 7vw, 5rem); line-height: 1.1; color: var(--white); margin: 0; } /* Том гарчиг */
        
        /* LOOPING WORDS (Солигддог үгс) */
        .rotator { height: 1.2em; overflow: hidden; display: inline-block; color: var(--light-blue); vertical-align: bottom; } /* Жааз */
        .rotator ul { list-style: none; padding: 0; margin: 0; transition: 0.5s; } /* Жагсаалт */
        .rotator li { height: 1.2em; } /* Үг бүрийн өндөр */

        /* SLIDER (Зургийн хэсэг) */
        .slider-section { padding: 100px 5%; overflow: hidden; position: relative; } /* Слайдер контейнер */
        .slider-track { display: flex; gap: 20px; width: max-content; } /* Слайд гүйх зам */
        .card { width: 350px; height: 450px; border-radius: 30px; background: #eee; overflow: hidden; } /* Слайд карт */
        .card img { width: 100%; height: 100%; object-fit: cover; } /* Зураг дүүргэлт */

        /* BUTTONS */
        .btn { background: var(--orange); color: white; padding: 18px 35px; border-radius: 100px; text-decoration: none; font-weight: 600; display: inline-block; transition: 0.3s; } /* Товчлуур */
        .btn:hover { transform: scale(1.05); background: var(--purple); } /* Хулгана очих үеийн эффект */
    </style>
</head>
<body>

    <nav class="navbar"> <div class="logo"> <svg width="100" height="30" viewBox="0 0 122 27" fill="none"> <path d="M17.9 20.5C17.1 21.5 16.3 22.6 15.6 23.7C12.2 18.8 8.0 14.6 3.1 11.2C4.2 10.5 5.3 9.7 6.3 8.9C10.3 12.6 14.2 16.5 17.9 20.5Z" fill="#255DDD"></path>
                <path d="M23.7 15.6C22.6 16.3 21.5 17.1 20.5 17.9C16.5 14.2 12.6 10.3 8.9 6.3C9.7 5.3 10.5 4.2 11.2 3.1C14.6 8.0 18.8 12.2 23.7 15.6Z" fill="#FF9300"></path>
            </svg>
        </div>
        <div class="menu-toggle" id="navToggle"> <span id="toggleText">ЦЭС</span> 
            <div class="hamburger"><span></span><span></span><span></span></div>
        </div>
    </nav>

    <div class="nav-overlay" id="overlay"> <div class="nav-links">
            <a href="index5.html">Нүүр хуудас</a>
			<a href="index5.html">Номны тухай</a>
			<a href="index5.html">Зохиолчийн тухай</a>
			<a href="index5.html">Захиалга өгөх</a>
			<a href="index5.html">Холбоо барих</a>
        </div>
    </div>

    <section class="hero"> <h1>СУПЕР<br> 
            <span class="rotator"> <ul id="loopList">
                    <li>ЧАНАР</li>
					<li>ТУСЛАХ</li>
					<li>ҮЗЭМЖ</li>
					<li>ЗОХИЦОЛ</li>
                </ul>
            </span>
        </h1>
        <p style="margin: 30px 0; font-size: 1.4rem; color: #ffffff; max-width: 500px;">Таны гэрт илүү амар амгалан, цэвэр цэмцгэр байдлыг бид бэлэглэнэ.</p>
        <a href="index5.html" class="btn">Захиалга өгөх</a>
    </section>

    <section class="slider-section"> <div class="slider-track" id="sliderTrack"> <div class="card"><img src="https://picsum.photos/400/500?sig=1"></div> <div class="card"><img src="https://picsum.photos/400/500?sig=2"></div> <div class="card"><img src="https://picsum.photos/400/500?sig=3"></div> <div class="card"><img src="https://picsum.photos/400/500?sig=4"></div> <div class="card"><img src="https://picsum.photos/400/500?sig=5"></div> </div>
    </section>

    <script>
        // --- 1. НАВИГАЦИ МЕНЮ ХӨДӨЛГӨӨН ---
        const toggle = document.getElementById('navToggle'); // Товчлуур сонгох
        const overlay = document.getElementById('overlay'); // Цэс сонгох
        const text = document.getElementById('toggleText'); // Текст сонгох
        
        toggle.addEventListener('click', () => { // Дарах үйлдэл
            overlay.classList.toggle('open'); // 'open' класс нэмэх/хасах
            text.innerText = overlay.classList.contains('open') ? "ХААХ" : "МЕНЮ"; // Текст солих
            text.style.color = overlay.classList.contains('open') ? "white" : "#23265C"; // Текст өнгө солих
        });

        // --- 2. LOOPING WORDS (GSAP АНИМЕЙШН) ---
        function startLoop() {
            const list = document.getElementById('loopList'); // Жагсаалт сонгох
            let step = 0; // Алхам тоологч
            setInterval(() => { // Хугацаат давталт
                step = (step + 1) % 4; // 4 үгийн хооронд шилжих (үгний тоог % 4 тоог өөрчлөх замаар нэмж хасч болно)
                gsap.to(list, { y: -step * 1.2 + "em", duration: 0.7, ease: "power2.inOut" }); // Дээшээ гүйлгэх
            }, 2500); // 2.5 секунд тутамд
        }

        // --- 3. CUSTOM SLIDER (SCROLLTRIGGER) ---
        gsap.registerPlugin(ScrollTrigger); // ScrollTrigger идэвхжүүлэх
        gsap.to("#sliderTrack", { // Замыг хөдөлгөх
            x: () => -(document.getElementById('sliderTrack').scrollWidth - window.innerWidth + 100), // Зүүн тийш гүйлгэх хэмжээ
            ease: "none", // Шугаман хөдөлгөөн
            scrollTrigger: {
                trigger: ".slider-section", // Скролл эхлэх цэг
                start: "top center", // Дэлгэцийн төвд ирэхэд
                end: "+=1000", // 1000px скролл хийх хугацаанд
                scrub: 1, // Хулганы скроллтой уяж өгөх
            }
        });

        window.onload = startLoop; // Хуудас ачаалагдахад текстийг тоглуулах
    </script>
</body>
</html>
